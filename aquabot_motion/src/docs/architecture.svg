<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b5563"/>
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="900" fill="#ffffff"/>

  <!-- ===================== SENSING / LOCALIZATION ===================== -->
  <rect x="40" y="24" width="230" height="64" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="155" y="50" text-anchor="middle" font-size="13" font-weight="600" fill="#312e81">GPS / IMU / AIS</text>
  <text x="155" y="68" text-anchor="middle" font-size="11" fill="#4338ca">raw sensor topics</text>

  <rect x="40" y="118" width="230" height="64" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="155" y="144" text-anchor="middle" font-size="13" font-weight="600" fill="#312e81">gz2ros + EKF</text>
  <text x="155" y="162" text-anchor="middle" font-size="11" fill="#4338ca">aquabot_ekf &#8594; /odom, /tf</text>

  <line x1="155" y1="88" x2="155" y2="116" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== PLANNING ===================== -->
  <rect x="360" y="24" width="240" height="64" rx="10" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="480" y="50" text-anchor="middle" font-size="13" font-weight="600" fill="#164e63">Turbine positions</text>
  <text x="480" y="68" text-anchor="middle" font-size="11" fill="#0e7490">AIS sensor (lat/long &#8594; xy)</text>

  <rect x="360" y="118" width="240" height="76" rx="10" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="480" y="144" text-anchor="middle" font-size="13" font-weight="600" fill="#164e63">A* Planner (planner.py)</text>
  <text x="480" y="162" text-anchor="middle" font-size="11" fill="#0e7490">bitangent visibility graph</text>
  <text x="480" y="178" text-anchor="middle" font-size="11" fill="#0e7490">rocks + islands + turbines as no-go zones</text>

  <line x1="480" y1="88" x2="480" y2="116" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="150" x2="358" y2="150" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="314" y="140" text-anchor="middle" font-size="10" fill="#6b7280">boat pose</text>

  <!-- ===================== MISSION STATE MACHINE ===================== -->
  <rect x="200" y="236" width="400" height="96" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="400" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#713f12">Mission state machine (mission_turbines.py)</text>
  <text x="400" y="282" text-anchor="middle" font-size="11" fill="#854d0e">WAITING &#8594; PLAN_APPROACH &#8594; ORBITING &#8594; next turbine</text>
  <text x="400" y="298" text-anchor="middle" font-size="11" fill="#854d0e">A* approach leg + dense analytic circle, concatenated</text>
  <text x="400" y="314" text-anchor="middle" font-size="11" fill="#854d0e">into ONE continuous /aquabot/plan (no stop-and-go)</text>

  <line x1="480" y1="194" x2="480" y2="234" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="155" y1="182" x2="155" y2="284" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="155" y1="284" x2="198" y2="284" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="140" y="230" text-anchor="middle" font-size="10" fill="#6b7280" transform="rotate(-90 140 230)">odom</text>

  <!-- ===================== SMPPI CONTROLLER ===================== -->
  <rect x="120" y="384" width="740" height="270" rx="12" fill="#f8fafc" stroke="#334155" stroke-width="1.8"/>
  <text x="490" y="410" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">SMPPI controller &#8212; AquabotController (motion_node.cpp)</text>

  <line x1="400" y1="332" x2="400" y2="382" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="415" y="365" font-size="10" fill="#6b7280">/aquabot/plan</text>

  <!-- CPU block -->
  <rect x="150" y="428" width="330" height="196" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="315" y="452" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e3a8a">CPU (OpenMP)</text>
  <text x="315" y="474" text-anchor="middle" font-size="11" fill="#1e40af">"ghost boat" reference trajectory</text>
  <text x="315" y="490" text-anchor="middle" font-size="11" fill="#1e40af">(carrot speed adapts to current speed)</text>
  <text x="315" y="512" text-anchor="middle" font-size="11" fill="#1e40af">sample K=4000 rollouts of control-RATE</text>
  <text x="315" y="528" text-anchor="middle" font-size="11" fill="#1e40af">noise (common + differential mode)</text>
  <text x="315" y="550" text-anchor="middle" font-size="11" fill="#1e40af">importance-weighted update:</text>
  <text x="315" y="566" text-anchor="middle" font-size="11" fill="#1e40af">w_k &#8733; exp(-(cost_k-min)/&#955;)</text>
  <text x="315" y="588" text-anchor="middle" font-size="11" fill="#1e40af">integrate rate &#8594; clamp to actuator limits</text>
  <text x="315" y="608" text-anchor="middle" font-size="11" fill="#1e40af">receding horizon shift each tick</text>

  <!-- GPU block -->
  <rect x="510" y="428" width="310" height="196" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="665" y="452" text-anchor="middle" font-size="12.5" font-weight="600" fill="#14532d">GPU (CUDA kernel)</text>
  <text x="665" y="474" text-anchor="middle" font-size="11" fill="#166534">1 thread per rollout, K=4000 parallel</text>
  <text x="665" y="496" text-anchor="middle" font-size="11" fill="#166534">RK4 integration of 3-DOF Fossen</text>
  <text x="665" y="512" text-anchor="middle" font-size="11" fill="#166534">surge/sway/yaw dynamics</text>
  <text x="665" y="534" text-anchor="middle" font-size="11" fill="#166534">Coriolis-centripetal coupling</text>
  <text x="665" y="550" text-anchor="middle" font-size="11" fill="#166534">+ linear/quadratic drag</text>
  <text x="665" y="572" text-anchor="middle" font-size="11" fill="#166534">per-rollout cost: cross/along-track,</text>
  <text x="665" y="588" text-anchor="middle" font-size="11" fill="#166534">heading, speed, yaw-rate, effort</text>
  <text x="665" y="608" text-anchor="middle" font-size="11" fill="#166534">&#8594; costs[K] returned to host</text>

  <line x1="480" y1="526" x2="508" y2="526" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="494" y="516" text-anchor="middle" font-size="9" fill="#6b7280" transform="rotate(-90 494 516)"></text>

  <!-- ===================== OUTPUT ===================== -->
  <rect x="330" y="700" width="320" height="64" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="490" y="726" text-anchor="middle" font-size="13" font-weight="600" fill="#7f1d1d">Thruster commands</text>
  <text x="490" y="744" text-anchor="middle" font-size="11" fill="#991b1b">left/right thrust + azimuth angle</text>

  <line x1="490" y1="654" x2="490" y2="698" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="360" y="800" width="260" height="56" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="490" y="833" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Gazebo boat</text>

  <line x1="490" y1="764" x2="490" y2="798" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- legend -->
  <rect x="120" y="672" width="14" height="14" fill="#dbeafe" stroke="#2563eb"/>
  <text x="140" y="683" font-size="10" fill="#334155">CPU work</text>
  <rect x="210" y="672" width="14" height="14" fill="#dcfce7" stroke="#16a34a"/>
  <text x="230" y="683" font-size="10" fill="#334155">GPU work</text>
</svg>
